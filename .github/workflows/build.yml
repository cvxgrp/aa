---
name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Every Monday at 06:00 UTC.
    - cron: '0 6 * * 1'

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y libopenblas-dev liblapack-dev
      - run: make
      - run: make test

  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: brew install openblas lapack
      - run: make
      - run: make test

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - run: sudo apt-get update && sudo apt-get install -y libopenblas-dev liblapack-dev
      - run: python -m pip install --upgrade pip setuptools wheel cython numpy pytest
      - name: Install the Cython extension (editable)
        run: python -m pip install -e .
      - name: Run pytest suite
        run: pytest -v tests/python/test_aa.py
